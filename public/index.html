<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TO—DO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f5f3ee;
    --paper-edge: #eae6da;
    --ink: #1e1e1a;
    --ink-soft: #78756b;
    --ink-faint: #a9a596;
    --rule: #d9d4c5;
    --accent: #35415c;
    --accent-soft: #35415c22;
    --done: #4b5d46;
    --danger: #9c3b2e;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    min-height:100vh;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(30,30,26,0.035) 1px, transparent 0);
    background-size: 14px 14px;
    color: var(--ink);
    font-family: 'Space Mono', ui-monospace, monospace;
  }

  body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding: 8vh 20px 10vh;
  }

  .sheet{
    width:100%;
    max-width: 560px;
    background: var(--paper);
    border: 1px solid var(--paper-edge);
    box-shadow: 0 1px 0 rgba(30,30,26,0.04), 0 20px 40px -28px rgba(30,30,26,0.35);
    border-radius: 6px;
    padding: 40px 36px 28px;
  }

  header{
    border-bottom: 1px solid var(--rule);
    padding-bottom: 18px;
    margin-bottom: 22px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }

  h1{
    margin:0;
    font-size: 22px;
    letter-spacing: 0.35em;
    font-weight: 700;
  }

  .dateline{
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  form{
    display:flex;
    gap: 10px;
    margin-bottom: 26px;
  }

  .field{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    border-bottom: 1px solid var(--ink-faint);
    transition: border-color 0.2s ease;
  }

  .field:focus-within{ border-color: var(--accent); }

  .field::before{
    content: "›";
    color: var(--ink-faint);
    margin-right: 8px;
    font-weight: 700;
  }

  input[type="text"]{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    padding: 8px 0;
  }

  input[type="text"]::placeholder{ color: var(--ink-faint); }

  button.add{
    border:none;
    background: var(--accent);
    color: var(--paper);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 0 18px;
    border-radius: 3px;
    cursor:pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }

  button.add:hover{ background:#2a3349; }
  button.add:active{ transform: scale(0.96); }

  ul.list{
    list-style:none;
    margin:0;
    padding:0;
  }

  li.item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding: 13px 0;
    border-bottom: 1px dashed var(--rule);
    opacity:0;
    transform: translateY(4px);
    animation: rise 0.28s ease forwards;
  }

  @keyframes rise{
    to{ opacity:1; transform:none; }
  }

  li.item:last-child{ border-bottom:none; }

  .box{
    flex-shrink:0;
    width: 18px;
    height: 18px;
    margin-top:1px;
    border: 1px solid var(--ink-soft);
    border-radius: 3px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    background: transparent;
    color: transparent;
    font-size: 12px;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .box:hover{ border-color: var(--done); }

  li.done .box{
    background: var(--done);
    border-color: var(--done);
    color: var(--paper);
  }

  .text-wrap{
    position:relative;
    flex:1;
    padding-top: 1px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .text-wrap svg{
    position:absolute;
    left:0; top: 46%;
    width:100%;
    height: 14px;
    overflow:visible;
    pointer-events:none;
  }

  .text-wrap path{
    fill:none;
    stroke: var(--ink-soft);
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-dasharray: 140;
    stroke-dashoffset: 140;
    transition: stroke-dashoffset 0.45s cubic-bezier(.55,.06,.4,.98);
  }

  li.done .text-wrap path{ stroke-dashoffset: 0; }

  li.done .task-text{ color: var(--ink-soft); transition: color 0.3s ease 0.1s; }

  .del{
    flex-shrink:0;
    border:none;
    background:transparent;
    color: var(--ink-faint);
    font-size: 15px;
    line-height:1;
    cursor:pointer;
    padding: 2px 4px;
    transition: color 0.15s ease;
  }

  .del:hover{ color: var(--danger); }

  .empty{
    padding: 30px 0;
    text-align:center;
    color: var(--ink-faint);
    font-size: 13px;
  }

  .empty .caret{
    display:inline-block;
    width:7px; height:13px;
    background: var(--ink-faint);
    margin-left:4px;
    vertical-align:-2px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink{ 50%{ opacity:0; } }

  footer{
    margin-top: 22px;
    padding-top: 14px;
    border-top: 1px dashed var(--rule);
    display:flex;
    justify-content:space-between;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
  }

  @media (prefers-reduced-motion: reduce){
    li.item{ animation:none; opacity:1; transform:none; }
    .text-wrap path{ transition:none; }
  }

  @media (max-width: 480px){
    .sheet{ padding: 30px 22px 22px; }
    header{ flex-direction:column; align-items:flex-start; gap:6px; }
  }
</style>
</head>
<body>
  <main class="sheet">
    <header>
      <h1>TO—DO</h1>
      <span class="dateline" id="dateline"></span>
    </header>

    <form id="form">
      <label class="field">
        <input type="text" id="input" placeholder="cosa c'è da fare?" autocomplete="off" maxlength="200" />
      </label>
      <button type="submit" class="add">aggiungi</button>
    </form>

    <ul class="list" id="list"></ul>
    <div class="empty" id="empty" style="display:none">la lista è vuota<span class="caret"></span></div>

    <footer>
      <span id="open-count">0 aperti</span>
      <span id="total-count">0 totali</span>
    </footer>
  </main>

<script>
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('empty');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const openCountEl = document.getElementById('open-count');
  const totalCountEl = document.getElementById('total-count');
  const datelineEl = document.getElementById('dateline');

  datelineEl.textContent = new Date().toLocaleDateString('it-IT', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  let todos = [];

  async function load(){
    const res = await fetch('/api/todos');
    todos = await res.json();
    render();
  }

  function render(){
    listEl.innerHTML = '';
    if(todos.length === 0){
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
    }

    for(const t of todos){
      const li = document.createElement('li');
      li.className = 'item' + (t.done ? ' done' : '');
      li.dataset.id = t.id;

      const box = document.createElement('button');
      box.className = 'box';
      box.type = 'button';
      box.textContent = '✓';
      box.addEventListener('click', () => toggle(t.id, !t.done));

      const textWrap = document.createElement('span');
      textWrap.className = 'text-wrap';
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = t.text;
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 100 10');
      svg.setAttribute('preserveAspectRatio', 'none');
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', 'M1,6 C 28,3.5 68,7.5 99,4');
      svg.appendChild(path);
      textWrap.appendChild(span);
      textWrap.appendChild(svg);

      const del = document.createElement('button');
      del.className = 'del';
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', () => remove(t.id));

      li.appendChild(box);
      li.appendChild(textWrap);
      li.appendChild(del);
      listEl.appendChild(li);
    }

    const openCount = todos.filter(t => !t.done).length;
    openCountEl.textContent = openCount + ' aperti';
    totalCountEl.textContent = todos.length + ' totali';
  }

  async function add(text){
    const res = await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if(res.ok){
      const row = await res.json();
      todos.push(row);
      render();
    }
  }

  async function toggle(id, done){
    const t = todos.find(x => x.id === id);
    if(t) t.done = done;
    render();
    await fetch('/api/todos', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, done })
    });
  }

  async function remove(id){
    todos = todos.filter(t => t.id !== id);
    render();
    await fetch('/api/todos?id=' + id, { method: 'DELETE' });
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    add(text);
  });

  load();
</script>
</body>
</html>
